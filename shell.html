<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: system-ui, sans-serif;
}

canvas {
    display: block;
    width: 100vw;
    height: calc(100vw * 1024 / 1920);
    max-height: 100vh;
    max-width: calc(100vh * 1920 / 1024);
    margin: auto;
}

#ui {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 10;

    width: 260px;
    padding: 14px;

    color: white;
    background: rgba(0, 0, 0, 0.62);
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 14px;
    backdrop-filter: blur(10px);

    user-select: none;
}

#title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 10px;
}

.upload-btn {
    display: block;
    cursor: pointer;
    width: 100%;
    text-align: center;

    padding: 9px 12px;
    border-radius: 10px;

    background: white;
    color: black;

    font-size: 14px;
    font-weight: 700;
}

.upload-btn:hover {
    background: #ddd;
}

#audio-file {
    display: none;
}

#file-name {
    margin-top: 9px;
    font-size: 13px;
    opacity: 0.85;

    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.control {
    margin-top: 12px;
}

.control label {
    display: flex;
    justify-content: space-between;
    align-items: center;

    margin-bottom: 5px;

    font-size: 12px;
    opacity: 0.75;
}

input[type="range"] {
    width: 100%;
}

select {
    width: 100%;
    padding: 7px;
    border-radius: 8px;
    border: none;
    outline: none;
}

#hint {
    margin-top: 12px;
    font-size: 11px;
    line-height: 1.45;
    opacity: 0.55;
}

#drop-overlay {
    position: fixed;
    inset: 0;
    z-index: 20;

    display: none;
    align-items: center;
    justify-content: center;

    color: white;
    font-size: 28px;
    font-weight: 800;

    background: rgba(0, 0, 0, 0.75);
    border: 4px dashed rgba(255, 255, 255, 0.45);
}
</style>
</head>

<body>

<div id="ui">
    <div id="title">SpectrumPlay</div>

    <label class="upload-btn">
        Load audio
        <input id="audio-file" type="file" accept="audio/*">
    </label>

    <div id="file-name">No file loaded</div>

    <div class="control">
        <label>
            <span>Bars</span>
            <span id="bars-value">32</span>
        </label>
        <input id="bars" type="range" min="2" max="512" value="32" step="1">
    </div>

    <div class="control">
        <label>Color</label>
        <select id="color-schema">
            <option value="0">Plasma</option>
            <option value="1">Turbo</option>
            <option value="2">Magma</option>
            <option value="3">Inferno</option>
        </select>
    </div>

    <div class="control">
        <label>
            <span>Gain</span>
            <span id="gain-value">1.0</span>
        </label>
        <input id="gain" type="range" min="0.1" max="10" value="1" step="0.1">
    </div>
    <button id="mic-btn">Start mic</button>
    <div id="hint">
        Drop audio file here<br>
        Keys: 1–4 colors · A/D bars · Space pause
    </div>
</div>

<div id="drop-overlay">Drop audio file</div>

<canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

<script>
var Module = {
    canvas: (function() {
        var canvas = document.getElementById("canvas");
        canvas.width = 1920;
        canvas.height = 1024;
        return canvas;
    })()
};
</script>

{{{ SCRIPT }}}

<script>
let micStream = null;
let audioCtx = null;
let source = null;
let processor = null;
let micOn = false;

const btn = document.getElementById("mic-btn");

btn.addEventListener("click", async () => {

    if (!micOn) {
        // START
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        audioCtx = new AudioContext();
        source = audioCtx.createMediaStreamSource(micStream);

        processor = audioCtx.createScriptProcessor(1024, 1, 1);

        source.connect(processor);
        processor.connect(audioCtx.destination);

        processor.onaudioprocess = (e) => {
            const input = e.inputBuffer.getChannelData(0);

            const ptr = Module._malloc(input.length * 4);
            (Module.HEAPF32 || HEAPF32).set(input, ptr / 4);

            Module.ccall(
                "push_data",
                null,
                ["number", "number"],
                [ptr, input.length]
            );

            Module._free(ptr);
        };

        micOn = true;
        btn.textContent = "Stop mic";

    } else {
        // STOP

        if (processor) {
            processor.disconnect();
            processor.onaudioprocess = null;
        }

        if (source) {
            source.disconnect();
        }

        if (audioCtx) {
            audioCtx.close();
        }

        if (micStream) {
            micStream.getTracks().forEach(track => track.stop());
        }

        micStream = null;
        audioCtx = null;
        source = null;
        processor = null;

        micOn = false;
        btn.textContent = "Start mic";
    }
});
async function loadAudioFile(file) {
    if (!file) return;

    document.getElementById("file-name").textContent = file.name;

    const data = new Uint8Array(await file.arrayBuffer());

    const ptr = Module._malloc(data.length);
    HEAPU8.set(data, ptr);

    let ext = ".wav";
    if (file.name.includes(".")) {
        ext = "." + file.name.split(".").pop().toLowerCase();
    }

    Module.ccall(
        "load_music_web",
        null,
        ["number", "number", "string"],
        [ptr, data.length, ext]
    );
}

document.getElementById("gain").addEventListener("input", (e) => {
    const value = parseFloat(e.target.value);
    document.getElementById("gain-value").textContent = value.toFixed(1);

    Module.ccall(
        "set_gain_web",
        null,
        ["number"],
        [value]
    );
});
document.getElementById("audio-file").addEventListener("change", async (e) => {
    await loadAudioFile(e.target.files[0]);
});

const dropOverlay = document.getElementById("drop-overlay");

window.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropOverlay.style.display = "flex";
});

window.addEventListener("dragleave", (e) => {
    e.preventDefault();
    dropOverlay.style.display = "none";
});

window.addEventListener("drop", async (e) => {
    e.preventDefault();
    dropOverlay.style.display = "none";

    const file = e.dataTransfer.files[0];
    await loadAudioFile(file);
});

document.getElementById("bars").addEventListener("input", (e) => {
    const value = parseInt(e.target.value, 10);
    document.getElementById("bars-value").textContent = value;

    Module.ccall(
        "set_bars_web",
        null,
        ["number"],
        [value]
    );
});

document.getElementById("color-schema").addEventListener("change", (e) => {
    const value = parseInt(e.target.value, 10);

    Module.ccall(
        "set_color_schema_web",
        null,
        ["number"],
        [value]
    );
});
</script>

</body>
</html>
